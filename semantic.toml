# Authored views (views/*.sql) are described here so the MCP/`/schema` can render them:
# [view.your_view_name]
# description = "What this derivation computes."

[view.round]
description = "Protocol rounds (Livepeer subgraph `Round`), one row per RoundsManager.NewRound. Round ids continue from the L1 era (Arbitrum began ~2466). Fully event-derived."

[view.transcoder]
description = "Orchestrators/transcoders (Livepeer subgraph `Transcoder`), reconstructed from BondingManager events. activation_round/deactivation_round/reward_cut/fee_share are exact; status matches the subgraph's Registered/NotRegistered. totalStake/volume are NOT here — the subgraph reads those via eth_call, outside nuthatch's event-only path."

[view.delegator]
description = "Stake delegators (Livepeer subgraph `Delegator`). delegate_address/start_round are exact; bonded_amount is the last Bond snapshot and does not yet fold in later Unbond/Rebond/WithdrawStake deltas."

[view.protocol]
description = "The singleton Protocol row (id='0'). current_round and the counts are exact/event-derived; inflation & totalActiveStake are eth_call-only in the subgraph and intentionally omitted."

[view.poll]
description = "Governance polls (Livepeer subgraph `Poll`), joining factory-discovered Poll children to their PollCreator.PollCreated event, with raw vote tallies from poll__vote."
